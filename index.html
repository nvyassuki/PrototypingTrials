<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FloatNote</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="expanded">

  <!-- Collapsed: small pip that follows cursor -->
  <div id="pip">FN</div>

  <!-- Expanded: full notes panel -->
  <div id="panel">

    <div id="titlebar">
      <span id="app-name">FloatNote</span>
      <div id="titlebar-right">
        <span id="voice-dot" class="idle" title="Say 'Bunny' to activate voice"></span>
        <div id="titlebar-actions">
          <button id="collapse-btn" title="Collapse (Cmd+Shift+Space)">·</button>
          <button id="hide-btn"     title="Hide">−</button>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div id="input-row">
        <textarea id="note-input" placeholder="Type a note… (Shift+Enter for new line)" rows="1" spellcheck="true"></textarea>
        <button id="search-toggle-btn" title="Search notes">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>
      <div id="search-bar">
        <input type="text" id="search-input" placeholder="Search notes…" autocomplete="off" />
      </div>
    </div>

    <div id="notes-list"></div>

    <div id="undo-toast">
      <span id="undo-label">Note deleted</span>
      <button id="undo-btn">Undo</button>
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
